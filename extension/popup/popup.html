<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 340px;
            min-height: 200px;
            background: #030712;
            color: #f9fafb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #1f2937;
            background: #111827;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 15px;
            color: #2dd4bf;
        }

        .logo-icon {
            font-size: 18px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
        }

        .status-dot.scanning {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .status-dot.unsafe {
            background: #ef4444;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* Current URL section */
        .url-section {
            padding: 12px 16px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .url-label {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }

        .url-text {
            font-family: monospace;
            font-size: 11px;
            color: #9ca3af;
            word-break: break-all;
            max-height: 36px;
            overflow: hidden;
        }

        /* Verdict card */
        .verdict-card {
            padding: 16px;
            margin: 12px;
            border-radius: 10px;
            border: 1px solid;
        }

        .verdict-card.safe {
            background: #022c22;
            border-color: #065f46;
        }

        .verdict-card.unsafe {
            background: #2d0a0a;
            border-color: #7f1d1d;
        }

        .verdict-card.scanning {
            background: #1c1a07;
            border-color: #78350f;
        }

        .verdict-card.idle {
            background: #111827;
            border-color: #1f2937;
        }

        .verdict-label {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .verdict-label.safe {
            color: #34d399;
        }

        .verdict-label.unsafe {
            color: #f87171;
        }

        .verdict-label.scanning {
            color: #fbbf24;
        }

        .verdict-label.idle {
            color: #6b7280;
        }

        .confidence {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        /* Confidence bar */
        .bar-track {
            width: 100%;
            height: 4px;
            background: #1f2937;
            border-radius: 2px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease;
        }

        .bar-fill.safe {
            background: #10b981;
        }

        .bar-fill.unsafe {
            background: #ef4444;
        }

        /* Reasons list */
        .reasons {
            list-style: none;
            margin-bottom: 8px;
        }

        .reasons li {
            font-size: 11px;
            color: #9ca3af;
            padding: 2px 0;
            padding-left: 12px;
            position: relative;
        }

        .reasons li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #f87171;
        }

        .reasons li.safe-item::before {
            color: #34d399;
        }

        /* Action buttons */
        .actions {
            padding: 0 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn {
            width: 100%;
            padding: 9px 12px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: #2dd4bf;
            color: #030712;
        }

        .btn-secondary {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #374151;
        }

        .btn-danger {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #991b1b;
        }

        /* Footer */
        .footer {
            padding: 8px 16px;
            border-top: 1px solid #1f2937;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-text {
            font-size: 10px;
            color: #4b5563;
        }

        .open-dashboard {
            font-size: 10px;
            color: #2dd4bf;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .open-dashboard:hover {
            text-decoration: underline;
        }

        /* Loading spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #1f2937;
            border-top-color: #2dd4bf;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo">
            <span class="logo-icon">🛡</span>
            Aegis AI
        </div>
        <div class="status-dot" id="statusDot"></div>
    </div>

    <div class="url-section">
        <div class="url-label">Current page</div>
        <div class="url-text" id="currentUrl">Loading...</div>
    </div>

    <div class="verdict-card idle" id="verdictCard">
        <div id="verdictContent">
            <!-- JS populates this -->
        </div>
    </div>

    <div class="actions" id="actionsBar">
        <!-- JS populates this -->
    </div>

    <div class="footer">
        <span class="footer-text">Aegis AI v1.0</span>
        <button class="open-dashboard" id="openDashboard">
            Open Dashboard →
        </button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
